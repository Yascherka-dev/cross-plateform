name: app1
description: "SOS Canicule — alertes chaleur et points de fraîcheur à Paris"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Appels HTTP (Open-Meteo + OpenData Paris)
  http: ^1.2.0

  # Géolocalisation GPS
  geolocator: ^11.0.0

  # Carte interactive
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  supabase_flutter: ^2.14.2
  url_launcher: ^6.3.2
  flutter_dotenv: ^6.0.1
  google_fonts: ^8.1.0
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Génération automatique des icônes d'app pour Android et iOS
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  # Source: le plus grand logo disponible
  image_path: "assets/images/logo128.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/

